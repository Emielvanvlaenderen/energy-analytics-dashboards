# Prefer config in web/netlify.toml when base directory is `web`.
[build]
  base = "web"
  command = "npm ci --include=dev && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirects live in web/public/_redirects (copied to dist) — Netlify applies them from the publish dir.
# Leave VITE_API_BASE_URL empty on Netlify.

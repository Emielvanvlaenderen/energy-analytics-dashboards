[build]
  base = "web"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api to Render (leave VITE_API_BASE_URL empty on Netlify).
[[redirects]]
  from = "/api/*"
  to = "https://energy-analytics-api-5u38.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Used when Netlify base directory is `web` (publish = dist).
[build]
  command = "npm ci --include=dev && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Call Render API directly (avoids Netlify /api proxy 404). Do not set in Netlify UI.
  VITE_API_BASE_URL = "https://energy-analytics-api-5u38.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://energy-analytics-api-5u38.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

name: Refresh market data

on:
  schedule:
    # 06:15 UTC daily (after Ember zip + PV_Live typically update)
    - cron: '15 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: POST Render refresh endpoint
        env:
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RENDER_API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Set GitHub secrets RENDER_API_URL and CRON_SECRET"
            exit 1
          fi
          curl -fsS --retry 3 --retry-delay 30 -X POST \
            "${RENDER_API_URL%/}/api/cron/refresh-market-data" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json"

# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Free tier: no persistent disk (guest workspaces are ephemeral until spin-down/redeploy).
# For always-on + disk, change plan to starter and add a disk block — see docs/DEPLOY.md.
services:
  - type: web
    name: energy-analytics-api
    runtime: node
    rootDir: web
    buildCommand: npm ci --include=dev && npm run build && pip3 install -r ../projects/ci-bess-uk/optimisation/requirements.txt -r ../projects/v2g-uk/optimisation/requirements.txt
    startCommand: node server/index.mjs
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_ROOT
        value: /tmp/energy-data
      - key: PYTHON
        value: python3
      - key: CORS_ORIGINS
        value: https://emiel-energy-analytics.netlify.app,http://localhost:5173
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
